name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig fmt --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        optimize: [Debug, ReleaseFast]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test -Doptimize=${{ matrix.optimize }}
      # Deterministic fuzz: random PPU/bus traffic + the save/load roundtrip
      # invariant. Debug only — that's where the safety checks are armed.
      - if: matrix.optimize == 'Debug'
        run: zig build fuzz

  sst:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        optimize: [Debug, ReleaseFast]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Resolve test-vector revision
        id: sst-rev
        run: echo "rev=$(git ls-remote https://github.com/SingleStepTests/65816.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: test-data/sst-65816
          key: sst-65816-${{ steps.sst-rev.outputs.rev }}
      - name: Fetch 65816 vectors
        run: |
          if [ ! -d test-data/sst-65816/.git ]; then
            mkdir -p test-data
            git clone --depth 1 https://github.com/SingleStepTests/65816.git test-data/sst-65816
          fi
      - run: zig build test-sst -Doptimize=${{ matrix.optimize }} -Dsst-sample=500
      - name: Resolve SPC700 test-vector revision
        id: sst-spc-rev
        run: echo "rev=$(git ls-remote https://github.com/SingleStepTests/spc700.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: test-data/sst-spc700
          key: sst-spc700-${{ steps.sst-spc-rev.outputs.rev }}
      - name: Fetch SPC700 vectors
        run: |
          if [ ! -d test-data/sst-spc700/.git ]; then
            mkdir -p test-data
            git clone --depth 1 https://github.com/SingleStepTests/spc700.git test-data/sst-spc700
          fi
      - run: zig build test-sst-spc700 -Doptimize=${{ matrix.optimize }} -Dsst-sample=500

  roms:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        optimize: [Debug, ReleaseFast]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Resolve ROM revision
        id: rom-rev
        run: echo "rev=$(git ls-remote https://github.com/PeterLemon/SNES.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: test-data/snes-roms
          key: snes-roms-${{ steps.rom-rev.outputs.rev }}
      - name: Fetch test ROMs
        run: |
          if [ ! -d test-data/snes-roms/.git ]; then
            mkdir -p test-data
            git clone --depth 1 https://github.com/PeterLemon/SNES.git test-data/snes-roms
          fi
      - run: zig build test-roms -Doptimize=${{ matrix.optimize }}
      # The accurate core must reproduce every golden hash: a line nothing
      # races mid-scanline renders bit-identically to the fast core.
      - if: matrix.optimize == 'ReleaseFast'
        run: zig build test-roms -Doptimize=ReleaseFast -Drom-accurate
      # Frontend parity: the libretro entry points must reproduce the same
      # golden video/audio hashes and replay save states deterministically.
      - run: zig build test-libretro -Doptimize=${{ matrix.optimize }}
      # Deterministic perf-regression gate: runs the baseline ROMs and fails on
      # any drift of steps/cycles/vram_reads. vram_reads (renderer VRAM word
      # traffic) locks in the tile-row decode cache; wall-clock FPS is printed
      # for information but never gated (it's machine-dependent).
      - if: matrix.optimize == 'ReleaseFast'
        run: zig build bench-check

  sdl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      # SDL3 shared library, built once from source (ubuntu doesn't package
      # SDL3 yet) and cached. Only the dummy video/audio drivers are needed.
      - uses: actions/cache@v4
        id: sdl3-cache
        with:
          path: sdl3-lib
          key: sdl3-release-3.2.16-${{ runner.os }}
      - name: Build SDL3
        if: steps.sdl3-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch release-3.2.16 https://github.com/libsdl-org/SDL.git sdl3-src
          # SDL_UNIX_CONSOLE_BUILD: the runner has no X11/Wayland dev headers
          # and doesn't need them — the smoke test uses the dummy drivers.
          cmake -S sdl3-src -B sdl3-src/build -DCMAKE_BUILD_TYPE=Release \
            -DSDL_SHARED=ON -DSDL_STATIC=OFF -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
            -DSDL_UNIX_CONSOLE_BUILD=ON
          cmake --build sdl3-src/build -j"$(nproc)"
          mkdir -p sdl3-lib && cp -P sdl3-src/build/libSDL3.so* sdl3-lib/
      - name: Resolve ROM revision
        id: rom-rev
        run: echo "rev=$(git ls-remote https://github.com/PeterLemon/SNES.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: test-data/snes-roms
          key: snes-roms-${{ steps.rom-rev.outputs.rev }}
      - name: Fetch test ROMs
        run: |
          if [ ! -d test-data/snes-roms/.git ]; then
            mkdir -p test-data
            git clone --depth 1 https://github.com/PeterLemon/SNES.git test-data/snes-roms
          fi
      - run: zig build -Doptimize=ReleaseFast
      # End-to-end smoke under SDL's dummy drivers: the SDL frontend must
      # reproduce the same golden video/audio hashes as the headless path
      # (values mirror tests/golden_hashes.zon).
      - name: SDL frontend smoke test
        run: |
          out=$(LD_LIBRARY_PATH="$PWD/sdl3-lib" SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy \
            ./zig-out/bin/yamabuki-sdl test-data/snes-roms/SPC700/Axel-F/Axel-F.sfc --frames 60 --scale 1)
          echo "$out"
          echo "$out" | grep -q "hash=045b5aaabee52325, audio=e2fbd615d2d54f15"
      # Without SDL installed the frontend must fail with a friendly error,
      # not a crash.
      - name: Missing-SDL error path
        run: |
          set +e
          msg=$(./zig-out/bin/yamabuki-sdl test-data/snes-roms/SPC700/Axel-F/Axel-F.sfc --frames 1 2>&1)
          code=$?
          echo "$msg"
          [ $code -eq 1 ] || exit 1
          echo "$msg" | grep -q "SDL3 runtime not found"

  cross:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-linux-gnu
          - aarch64-linux-gnu
          - aarch64-linux-musl
          - arm-linux-musleabihf
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
      # Handheld builds must be self-contained: no dynamic libc, no NEEDED
      # shared objects. Assert it for the musl targets that ship to devices.
      - name: Assert musl artifacts are statically linked
        if: contains(matrix.target, 'musl')
        run: tools/package_handheld.sh --verify-only ${{ matrix.target }}

  shaders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: sudo apt-get update && sudo apt-get install -y ninja-build
      # glslang + SPIRV-Cross, built from pinned source with zig as the C++
      # compiler (no system g++, no Vulkan SDK). Cached: it is the slow part.
      #
      # The key carries the OS and the zig version, and the restored binaries
      # are HEALTH-CHECKED rather than trusted — by compiling a real shader,
      # not by answering --version. All three lessons were paid for: (1) a
      # cache entry is immutable per key and actions/cache saves even from a
      # failed run, so one bad save wedged this job for every branch; (2) the
      # bake "succeeds" with 0 pairs baked (36 "tool failed" skips) unless the
      # assert below catches it; (3) a restored binary that answers --version
      # can still fail its first real compile with no output at all — the only
      # health check that means anything is the tool doing its actual job.
      - uses: actions/cache@v4
        id: shader-tools-cache
        with:
          path: .shader-tools/bin
          key: shader-tools-v2-${{ runner.os }}-zig0.16.0-${{ hashFiles('tools/build_shader_tools.sh') }}
      - name: Build shader tools (on cache miss or unusable cache)
        run: |
          smoke() {
            tmp="$(mktemp -d)"
            printf '#version 450\nlayout(location=0) out vec4 c;\nvoid main() { c = vec4(1.0); }\n' > "$tmp/s.frag"
            .shader-tools/bin/glslang -V "$tmp/s.frag" -o "$tmp/s.spv" >/dev/null 2>&1 \
              && .shader-tools/bin/spirv-cross "$tmp/s.spv" --version 330 >/dev/null 2>&1
          }
          if smoke; then
            echo "cached shader tools are healthy (compiled a real shader)"
          else
            echo "shader tools missing or failed the compile smoke test; building"
            rm -rf .shader-tools/bin
            tools/build_shader_tools.sh
            smoke || { echo "freshly built shader tools failed the smoke test" >&2; exit 1; }
          fi
      - run: tools/fetch_shaders.sh
      - run: zig build shaders
      # The bake is allowed to skip a (preset, profile) pair it cannot honour —
      # that is the design. What must not happen is a *silent* regression in
      # coverage, so assert the set we promise: every handheld-tier preset has
      # to exist for GL ES 3, and the two shaders the whole transpile exists for
      # (crt-royale, crt-guest-advanced) have to exist for desktop.
      - name: Assert the promised presets baked
        run: |
          set -e
          for p in zfast-crt crt-pi crt-lottes-fast crt-easymode sharp-bilinear; do
            test -f "shaders/essl300/$p/preset.conf" \
              || { echo "handheld preset '$p' missing from essl300" >&2; exit 1; }
          done
          for p in crt-royale crt-guest-advanced; do
            test -f "shaders/glsl330/$p/preset.conf" \
              || { echo "desktop preset '$p' missing from glsl330" >&2; exit 1; }
          done
          echo "baked $(find shaders -name preset.conf | wc -l) (preset, profile) pairs"
