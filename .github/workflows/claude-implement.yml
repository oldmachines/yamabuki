name: Claude Implement

# Build Loop 1/3 — take an approved issue to an open PR.
#
# Adapted from the omega-ios build loop for yamabuki. The key adaptation: the
# authoritative verification is yamabuki's own CI workflow (ci.yml — zig build
# test, fuzz, SST, goldens, bench). The agent writes code and opens a PR; CI is
# the gate; Fix CI and Auto-merge drive it the rest of the way. The agent opens a
# DRAFT PR early (right after the first push) so a timeout can never strand a
# branch without a PR, and leans on CI rather than exhaustively building locally
# (local over-verification was burning the turn budget before the PR was opened).
#
# Entry point: a human applies the `ready-for-dev` label (the same label the old
# loop used). For issues that are ALREADY labeled (the label event fired in the
# past and won't replay), use the manual "Run workflow" button with the issue
# number, or remove+re-add the label.
#
# NOTE: `issues`-triggered and scheduled workflows only fire once this file is on
# the default branch — merge the PR that adds it to activate the loop.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue:
        description: "Issue number to implement (manual kick for already-labeled issues)"
        required: true
        type: string

# One build per issue; a re-label must not start a second.
concurrency:
  group: claude-implement-${{ github.event.issue.number || github.event.inputs.issue }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read
  checks: read

jobs:
  implement:
    # Only the human build-approval label, or an explicit manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'ready-for-dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the agent can branch from main cleanly

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Implement the issue
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # GH_PAT (not GITHUB_TOKEN) so the branch push / PR open re-triggers CI,
          # which is what wakes Fix CI / Auto-merge. Without it the loop stalls.
          github_token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          claude_args: >-
            --max-turns 150
            --allowedTools "Bash,Read,Glob,Grep,Edit,Write"
          prompt: |
            You are Build Loop step 1/3 (Implement) for the yamabuki
            SNES-emulator repository (oldmachines/yamabuki). The base branch is
            main. Implement exactly ONE issue, end to end, then stop.

            The issue number is: ${{ github.event.issue.number || github.event.inputs.issue }}

            CI (.github/workflows/ci.yml) is the AUTHORITATIVE gate — it runs the
            full zig build test / fuzz / SST / golden / bench suite on your PR, and
            Fix CI repairs anything it catches. So your job is to get a correct,
            reviewable PR OPEN, not to prove it green locally. Do NOT burn your turn
            budget exhaustively building/testing here; a single quick `zig build`
            compile-check is plenty. Lean on CI.

            Order of operations (open the PR EARLY so work is never stranded):

            1. Read the issue: `gh issue view <n>`. Understand its acceptance
               criteria and stay STRICTLY within its stated scope — do not
               refactor or "improve" adjacent code.
            2. Create a branch `claude/issue-<n>-<short-slug>` from the latest
               origin/main, make a first commit (even a WIP skeleton), and
               `git push -u origin` it.
            3. IMMEDIATELY open a **draft** PR (base main) whose body contains
               "Closes #<n>": `gh pr create --draft --base main --title ... --body ...`.
               Mirror a .github PR template's headings if one exists. This must
               happen before any deep work, so a later timeout still leaves a PR
               that CI + Fix CI can carry forward. Comment the PR link on the issue.
            4. Now implement the change on the branch, committing and pushing as you
               go (each push re-runs CI on the PR). NEVER weaken, skip, or delete a
               test/golden to make CI pass; if a golden must legitimately be
               re-minted, do it deliberately and justify it in the PR body.
            5. When the implementation is complete and pushed, mark the PR
               ready for review: `gh pr ready <n>`.

            Do NOT merge — CI verifies and Auto-merge lands it (core/`src` changes
            still require a human approval; see Auto-merge). If you run low on turns,
            leave the PR as a draft with a comment on what remains — never leave a
            branch without a PR.
