# The shaders yamabuki ships, and what they cost.
#
#   <name> | <tier> | <path under shader-src/slang-shaders/>
#
# Tier is a promise about the *handheld*, not a rating. `handheld` means the
# shader is cheap enough to be worth trying on a Cortex-A53-class device with a
# Mali-G31/G52; `desktop` means it is a fill-rate-hungry multi-pass shader that
# belongs on a real GPU and will not hold 60fps on a handheld. Both are baked
# and both are shipped -- the tier is printed at startup so nothing in the
# package is a trap.
#
# Sources are libretro/slang-shaders, fetched and revision-pinned by
# tools/fetch_shaders.sh; none of it is vendored into this repo. Those shaders
# are GPL-licensed and remain under their own terms.
#
# Re-bake with: tools/transpile_shaders.py

# --- handheld tier: single-pass, cheap, built for weak fill rate -------------
zfast-crt             | handheld | crt/zfast-crt.slangp
crt-pi                | handheld | crt/crt-pi.slangp
crt-lottes-fast       | handheld | crt/crt-lottes-fast.slangp
crt-easymode          | handheld | crt/crt-easymode.slangp
sharp-bilinear        | handheld | pixel-art-scaling/sharp-bilinear-simple.slangp

# --- desktop tier: multi-pass, mask LUTs, real GPU required ------------------
crt-lottes            | desktop  | crt/crt-lottes.slangp
crt-easymode-halation | desktop  | crt/crt-easymode-halation.slangp
gtu-v050              | desktop  | crt/gtu-v050.slangp
crt-guest-advanced    | desktop  | crt/crt-guest-advanced.slangp
crt-royale            | desktop  | crt/crt-royale.slangp

# Desktop-only for a reason that is not performance: these two build their
# sampling kernels with multidimensional array constructors (`float[][]()`),
# which no ESSL version below 310 has and which SPIRV-Cross cannot flatten. They
# bake for glsl330 and are skipped for both ES profiles -- so they will simply
# not appear on a handheld, rather than appearing and failing to compile there.
crt-geom              | desktop  | crt/crt-geom.slangp
crt-hyllian           | desktop  | crt/crt-hyllian.slangp
